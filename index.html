<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixels · sankhacooray</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<style>
  :root {
    --radius: 12px;
    --shadow: 0 8px 30px rgba(0,0,0,.25);
  }
  html[data-theme="dark"] {
    --bg: #0e1116; --panel: #171c24; --panel-2: #1f2630; --line: #2a323d;
    --text: #e7edf3; --muted: #93a1b0; --accent: #05a081; --accent-2: #38bdf8;
    --chip-bg: rgba(8,12,18,.72); --chip-text: #eaf2f8;
  }
  html[data-theme="light"] {
    --bg: #f4f6f9; --panel: #ffffff; --panel-2: #ffffff; --line: #e2e7ee;
    --text: #1a2330; --muted: #5d6b7a; --accent: #05a081; --accent-2: #0ea5e9;
    --chip-bg: rgba(255,255,255,.82); --chip-text: #1a2330;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  /* ---- Sign-in gate overlay ---- */
  .gate {
    position: fixed; inset: 0; z-index: 100; background: var(--bg);
    display: grid; place-items: center; text-align: center; padding: 24px;
  }
  .gate-card { max-width: 360px; }
  .gate-card h2 { margin: 6px 0 2px; }
  .gate-msg { color: var(--muted); font-size: 14px; margin: 0 0 20px; }
  .gate-msg b { color: var(--text); }
  #gbtn { display: inline-block; min-height: 44px; }
  .gate-switch {
    display: block; margin: 16px auto 0; background: transparent; border: 0;
    color: var(--accent-2); cursor: pointer; font-size: 13px; text-decoration: underline;
  }

  /* ---- App bar ---- */
  .appbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  .seg { display: flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; flex: none; }
  .seg button {
    appearance: none; border: 0; background: transparent; color: var(--muted);
    padding: 9px 14px; cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .seg button.active { background: var(--accent); color: #04231d; }
  .search { flex: 1; display: flex; gap: 8px; min-width: 0; }
  .search input {
    flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--line); color: var(--text);
    border-radius: 10px; padding: 10px 14px; font-size: 15px;
  }
  .search input:focus { outline: 2px solid var(--accent-2); border-color: transparent; }
  .btn {
    border: 0; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700;
    padding: 10px 18px; background: var(--accent); color: #04231d;
  }
  .btn:disabled { opacity: .55; cursor: progress; }
  .icon-btn {
    flex: none; width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
    border: 1px solid var(--line); background: var(--bg); color: var(--text);
    font-size: 18px; line-height: 1; display: grid; place-items: center;
  }

  /* ---- Floating filters card ---- */
  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 18px 60px; }
  .filters {
    position: relative; margin: 14px 0 0;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 16px;
    display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  select, .filters input {
    background: var(--bg); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-size: 14px; width: 100%;
  }
  .field.photos-only { display: none; }
  html[data-media="photos"] .field.photos-only { display: flex; }

  .status { margin: 16px 2px 4px; color: var(--muted); font-size: 13px; min-height: 18px; }
  .status.error { color: #ff8f8f; }

  /* ---- Results ---- */
  .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  .card {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); overflow: hidden;
  }
  .card img, .card video { width: 100%; display: block; background: #000; aspect-ratio: 3/2; object-fit: cover; }
  .chip {
    position: absolute; top: 8px; right: 8px; z-index: 2;
    background: var(--chip-bg); color: var(--chip-text); backdrop-filter: blur(6px);
    font-size: 11px; font-weight: 700; letter-spacing: .03em;
    padding: 4px 8px; border-radius: 999px; border: 1px solid rgba(255,255,255,.14);
  }
  .footer { margin-top: 28px; color: var(--muted); font-size: 12px; }
  .footer a { color: var(--accent-2); text-decoration: none; }

  /* ---- Tab strip (connector switcher) ---- */
  .search-controls { display: flex; gap: 12px; flex: 1; min-width: 0; }
  .tabs { display: flex; gap: 6px; flex: none; }
  .tab {
    appearance: none; border: 1px solid var(--line); background: var(--bg);
    color: var(--muted); padding: 9px 14px; border-radius: 10px; cursor: pointer;
    font-size: 14px; font-weight: 600; white-space: nowrap;
  }
  .tab.active { background: var(--accent); color: #04231d; border-color: transparent; }

  /* ---- Puzzle Builder connector ---- */
  .pb-card-panel {
    margin: 14px 0 0; background: var(--panel-2); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px;
    display: grid; gap: 12px;
  }
  .pb-presets { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .pb-presets-label { font-size: 12px; color: var(--muted); }
  .pb-chips { display: contents; }
  .pb-chip-refresh { color: var(--accent-2); }
  .pb-chip {
    border: 1px solid var(--line); background: var(--bg); color: var(--text);
    border-radius: 999px; padding: 6px 12px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .pb-chip:hover { border-color: var(--accent-2); }
  .pb-chip-clear { color: var(--muted); }
  .pb-textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 10px 12px; font: inherit; resize: vertical; min-height: 110px;
  }
  .pb-textarea:focus { outline: 2px solid var(--accent-2); border-color: transparent; }
  .pb-controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; }
  .pb-field { display: flex; flex-direction: column; gap: 5px; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em; }
  .pb-field input, .pb-field select {
    background: var(--bg); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-size: 14px; text-transform: none; letter-spacing: 0;
  }
  .pb-field input { width: 90px; }
  .pb-hint { margin: 0; color: var(--muted); font-size: 12px; }
  .pb-progress { margin: 14px 2px 0; color: var(--muted); font-size: 13px; min-height: 18px; }
  .pb-progress.error { color: #ff8f8f; }

  .pb-toolbar {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin: 14px 0 10px; padding: 10px 12px;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
  }
  .pb-selcount { font-size: 13px; color: var(--muted); margin-right: auto; }
  .pb-tbtn {
    border: 1px solid var(--line); background: var(--bg); color: var(--text);
    border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .pb-tbtn-primary { padding: 8px 14px; }
  .btn:disabled, .pb-tbtn:disabled { opacity: .55; cursor: progress; }

  .pb-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  .pb-result {
    position: relative; background: var(--panel); border: 2px solid var(--line);
    border-radius: var(--radius); overflow: hidden;
  }
  .pb-result.sel { border-color: var(--accent); }
  .pb-imgwrap { position: relative; cursor: pointer; }
  .pb-imgwrap img { width: 100%; display: block; background: #000; aspect-ratio: 1/1; object-fit: cover; }
  .pb-check {
    position: absolute; top: 8px; left: 8px; z-index: 3; width: 20px; height: 20px; cursor: pointer;
  }
  .pb-result .chip { top: 8px; right: 8px; }
  .pb-qchip {
    position: absolute; bottom: 8px; left: 8px; right: 8px; z-index: 2;
    background: var(--chip-bg); color: var(--chip-text); backdrop-filter: blur(6px);
    font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 8px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pb-cropbtn {
    position: absolute; bottom: 8px; right: 8px; z-index: 3;
    background: var(--chip-bg); color: var(--chip-text); border: 1px solid rgba(255,255,255,.14);
    border-radius: 8px; padding: 4px 8px; font-size: 11px; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <i class="fa-solid fa-images" style="font-size:42px"></i>
    <h2>Pixels</h2>
    <p class="gate-msg" id="gate-msg">Sign in to continue.</p>
    <div id="gbtn"></div>
    <button class="gate-switch" id="gate-switch" style="display:none">Use a different account</button>
  </div>
</div>

<div class="appbar">
  <div class="search-controls" id="search-controls">
    <div class="seg" id="seg">
      <button data-media="photos" class="active">Photos</button>
      <button data-media="videos">Videos</button>
    </div>
    <form class="search" id="search">
      <input id="query" placeholder="Search Pexels…" value="Sri Lanka landscape" autocomplete="off">
      <button class="btn" type="submit">Search</button>
    </form>
  </div>
  <a class="icon-btn" id="sheet-link" target="_blank" rel="noopener" title="Open query sheet" style="display:none"><i class="fa-solid fa-database"></i></a>
  <button class="icon-btn" id="theme" title="Toggle light / dark"><i class="fa-solid fa-moon"></i></button>
</div>

<div class="wrap">
  <div id="view-search">
  <div class="filters" id="filters">
    <div class="field">
      <label for="orientation">Orientation</label>
      <select id="orientation">
        <option value="">any</option><option>landscape</option><option>portrait</option><option>square</option>
      </select>
    </div>
    <div class="field">
      <label for="size">Min size</label>
      <select id="size">
        <option value="">any</option><option>large</option><option>medium</option><option>small</option>
      </select>
    </div>
    <div class="field photos-only">
      <label for="color">Color</label>
      <input id="color" placeholder="red / #1a2b3c" autocomplete="off">
    </div>
    <div class="field">
      <label for="per_page">Results</label>
      <input id="per_page" type="number" min="1" max="80" value="15">
    </div>
  </div>

    <p class="status" id="status"></p>
    <div class="grid" id="grid"></div>
  </div>

  <p class="footer">Media from <a href="https://www.pexels.com" target="_blank" rel="noopener">Pexels</a>.</p>
</div>

<script src="config.js"></script>
<!-- Data engine + connector host (the pluggable platform) -->
<script src="vendor/jszip.min.js"></script>
<script src="vendor/smartcrop.min.js"></script>
<script src="engine.js"></script>
<script src="host.js"></script>
<script src="processors/square-smart.js"></script>
<script src="connectors/puzzle-builder.js"></script>
<script>
  const $ = (s) => document.querySelector(s);
  const API_BASE = window.PIXELS_API_BASE || "";
  const AUTH_URL = window.PIXELS_AUTH_URL || "";
  const APP_ID = window.PIXELS_APP_ID || "pixels";
  const CLIENT_ID = window.GOOGLE_CLIENT_ID || "";
  const grid = $("#grid"), status = $("#status");
  let media = "photos";

  /* ---- Auth gate (token from auth-sankhacooray-com) ---- */
  function getToken() { try { return sessionStorage.getItem("pixels-token"); } catch (e) { return null; } }
  function setToken(t) { try { sessionStorage.setItem("pixels-token", t); } catch (e) {} }
  function clearToken() { try { sessionStorage.removeItem("pixels-token"); } catch (e) {} }
  function tokenValid(t) {
    if (!t) return false;
    try {
      const b = t.split(".")[0].replace(/-/g, "+").replace(/_/g, "/");
      const p = JSON.parse(decodeURIComponent(escape(atob(b))));
      return p.exp * 1000 > Date.now();
    } catch (e) { return false; }
  }
  /* ---- Sign in with Google (GIS) ---- */
  function showGate(msg) { $("#gate").style.display = "grid"; if (msg) $("#gate-msg").textContent = msg; }
  function hideGate() { $("#gate").style.display = "none"; }

  function onCredential(resp) {
    $("#gate-switch").style.display = "none";
    $("#gate-msg").textContent = "Signing in…";
    fetch(AUTH_URL + "?app=" + encodeURIComponent(APP_ID) + "&credential=" + encodeURIComponent(resp.credential))
      .then((r) => r.json())
      .then((data) => {
        if (data && data.token) { setToken(data.token); hideGate(); initApp(); return; }
        if (data && data.error === "forbidden") {
          $("#gate-msg").innerHTML = "<b>" + (data.email || "That account") +
            "</b> doesn't have access.<br>Contact Sankha (bsc2fast@gmail.com) to request it.";
        } else {
          $("#gate-msg").textContent = "Sign-in failed. Please try again.";
        }
        $("#gate-switch").style.display = "block";
      })
      .catch(() => { $("#gate-msg").textContent = "Network error. Please try again."; $("#gate-switch").style.display = "block"; });
  }

  function initGis() {
    if (!CLIENT_ID || CLIENT_ID.indexOf("PASTE_") === 0) {
      showGate("Sign-in isn't configured yet (missing Client ID)."); return;
    }
    if (!(window.google && google.accounts && google.accounts.id)) { return setTimeout(initGis, 120); }
    google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onCredential, auto_select: true });
    google.accounts.id.renderButton($("#gbtn"), { theme: "filled_blue", size: "large", text: "signin_with", shape: "pill" });
    google.accounts.id.prompt();
  }

  function switchAccount() {
    try { google.accounts.id.disableAutoSelect(); } catch (e) {}
    $("#gate-switch").style.display = "none";
    $("#gate-msg").textContent = "Choose an account to continue.";
    try { google.accounts.id.prompt(); } catch (e) {}
  }

  /* ---- App init (only runs once authenticated) ---- */
  function initApp() {
    /* Theme */
    const themeBtn = $("#theme");
    function applyTheme(t) {
      document.documentElement.setAttribute("data-theme", t);
      themeBtn.innerHTML = '<i class="fa-solid fa-' + (t === "dark" ? "moon" : "sun") + '"></i>';
      try { localStorage.setItem("pixels-theme", t); } catch (e) {}
    }
    applyTheme((function () { try { return localStorage.getItem("pixels-theme"); } catch (e) {} })() || "dark");
    themeBtn.addEventListener("click", () =>
      applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"));

    /* Media toggle */
    document.documentElement.setAttribute("data-media", media);
    $("#seg").addEventListener("click", (e) => {
      const btn = e.target.closest("button"); if (!btn) return;
      media = btn.dataset.media;
      document.documentElement.setAttribute("data-media", media);
      $("#seg").querySelectorAll("button").forEach((b) => b.classList.toggle("active", b === btn));
    });

    $("#search").addEventListener("submit", (e) => { e.preventDefault(); search(); });

    /* Connector host: builds the tab strip, registers the built-in Search
       view, and mounts any connectors (e.g. Puzzle Builder) as extra tabs. */
    if (window.Pixels && Pixels.init) Pixels.init();

    /* App-bar link to the query sheet (shown once we know its URL). */
    if (window.Pixels && Pixels.host && Pixels.host.loadGroups) {
      Pixels.host.loadGroups().then((d) => {
        if (d && d.sheetUrl) {
          const a = $("#sheet-link");
          a.href = d.sheetUrl; a.style.display = "";
        }
      }).catch(() => {});
    }
  }

  /* Re-gate when a token expires mid-session (called by the engine/host too). */
  window.pixelsReauth = function () {
    clearToken(); showGate("Your session expired — sign in again."); initGis();
  };

  /* ---- Quality label from pixel dimensions ---- */
  function quality(w, h) {
    const q = Math.min(w || 0, h || 0);
    if (q >= 2160) return "4K";
    if (q >= 1440) return "2K";
    if (q >= 1080) return "FHD";
    if (q >= 720) return "HD";
    return "SD";
  }

  /* ---- Search (now goes through PixelsEngine) ---- */
  async function search() {
    if (!$("#query").value.trim()) { setStatus("Type something to search."); return; }
    const btn = $("#search button");
    btn.disabled = true; setStatus("Searching " + media + "…"); grid.innerHTML = "";
    try {
      const { items, total } = await PixelsEngine.search({
        type: media,
        query: $("#query").value,
        orientation: $("#orientation").value,
        size: $("#size").value,
        perPage: $("#per_page").value,
        color: media === "photos" ? $("#color").value.trim() : ""
      });
      if (!items.length) { setStatus("No results. Try a different query."); return; }
      setStatus(total != null
        ? (items.length + " shown · ~" + total.toLocaleString() + " total")
        : (items.length + " results"));
      items.forEach((it) => grid.appendChild(card(it)));
    } catch (err) {
      if (err.code === "unauthorized") { window.pixelsReauth(); return; }
      setStatus(err.message, true);
    } finally {
      btn.disabled = false;
    }
  }
  function setStatus(msg, isErr) { status.textContent = msg || ""; status.classList.toggle("error", !!isErr); }

  function chip(text) { const c = document.createElement("span"); c.className = "chip"; c.textContent = text; return c; }

  /* Unified card renderer for normalized engine items. */
  function card(it) {
    const c = document.createElement("div"); c.className = "card";
    let mediaEl;
    if (it.type === "photo") {
      mediaEl = document.createElement("img");
      mediaEl.loading = "lazy"; mediaEl.src = it.preview; mediaEl.alt = it.alt || "";
    } else {
      mediaEl = document.createElement("video");
      mediaEl.src = it.full; mediaEl.poster = it.preview;
      mediaEl.muted = true; mediaEl.loop = true; mediaEl.playsInline = true;
      mediaEl.controls = true; mediaEl.preload = "metadata";
      mediaEl.addEventListener("mouseenter", () => mediaEl.play().catch(() => {}));
      mediaEl.addEventListener("mouseleave", () => mediaEl.pause());
    }
    c.append(chip(quality(it.width, it.height)), mediaEl);
    return c;
  }

  /* ---- Gate on load ---- */
  (function gate() {
    $("#gate-switch").addEventListener("click", switchAccount);
    if (tokenValid(getToken())) { hideGate(); initApp(); return; }
    showGate();
    initGis();
  })();
</script>
</body>
</html>
