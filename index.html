<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pexels Playground · sankhacooray</title>
<style>
  :root {
    --bg: #0e1116; --panel: #171c24; --panel-2: #1f2630; --line: #2a323d;
    --text: #e7edf3; --muted: #93a1b0; --accent: #05a081; --accent-2: #38bdf8;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 22px 24px 8px; max-width: 1200px; margin: 0 auto;
  }
  header h1 { margin: 0; font-size: 22px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }

  .tabs { display: flex; gap: 6px; margin: 18px 0 0; }
  .tab {
    appearance: none; border: 1px solid var(--line); background: var(--panel);
    color: var(--muted); padding: 9px 18px; border-radius: 10px 10px 0 0;
    cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .tab.active { background: var(--panel-2); color: var(--text); border-bottom-color: var(--panel-2); }

  form {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 0 var(--radius) var(--radius) var(--radius);
    padding: 18px; display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.wide { grid-column: 1 / -1; }
  label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  input, select {
    background: var(--bg); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 9px 11px; font-size: 14px; width: 100%;
  }
  input:focus, select:focus { outline: 2px solid var(--accent-2); border-color: transparent; }
  button.go {
    background: var(--accent); color: #04231d; border: 0; font-weight: 700;
    padding: 11px 22px; border-radius: 8px; cursor: pointer; font-size: 14px; height: 40px;
  }
  button.go:disabled { opacity: .55; cursor: progress; }

  .status { margin: 18px 0 4px; color: var(--muted); font-size: 13px; min-height: 18px; }
  .status.error { color: #ff9b9b; }

  .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .card img, .card video { width: 100%; display: block; background: #000; aspect-ratio: 3/2; object-fit: cover; }
  .card .meta { padding: 9px 11px; font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; gap: 8px; }
  .card .meta a { color: var(--accent-2); text-decoration: none; }
  .card .meta a:hover { text-decoration: underline; }
  .credit { margin-top: 26px; color: var(--muted); font-size: 12px; }
  .credit a { color: var(--accent-2); }
  .hidden { display: none; }
</style>
</head>
<body>
<header>
  <h1>Pexels Playground</h1>
  <p>Local sandbox · key read from <code>.env</code> · proxied through <code>server.py</code></p>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-tab="photos">Photos</button>
    <button class="tab" data-tab="videos">Videos</button>
  </div>

  <!-- PHOTOS -->
  <form id="form-photos">
    <div class="field wide">
      <label for="p-query">Query</label>
      <input id="p-query" name="query" placeholder="e.g. Sri Lanka tea plantation" value="Sri Lanka landscape" required>
    </div>
    <div class="field">
      <label for="p-orientation">Orientation</label>
      <select id="p-orientation" name="orientation">
        <option value="">any</option><option>landscape</option><option>portrait</option><option>square</option>
      </select>
    </div>
    <div class="field">
      <label for="p-size">Min size</label>
      <select id="p-size" name="size">
        <option value="">any</option><option>large</option><option>medium</option><option>small</option>
      </select>
    </div>
    <div class="field">
      <label for="p-color">Color</label>
      <input id="p-color" name="color" placeholder="red / #1a2b3c">
    </div>
    <div class="field">
      <label for="p-per_page">Results</label>
      <input id="p-per_page" name="per_page" type="number" min="1" max="80" value="15">
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button class="go" type="submit">Search photos</button>
    </div>
  </form>

  <!-- VIDEOS -->
  <form id="form-videos" class="hidden">
    <div class="field wide">
      <label for="v-query">Query</label>
      <input id="v-query" name="query" placeholder="e.g. Sri Lanka aerial" value="Sri Lanka aerial" required>
    </div>
    <div class="field">
      <label for="v-orientation">Orientation</label>
      <select id="v-orientation" name="orientation">
        <option value="">any</option><option>landscape</option><option>portrait</option><option>square</option>
      </select>
    </div>
    <div class="field">
      <label for="v-size">Min size</label>
      <select id="v-size" name="size">
        <option value="">any</option><option>large</option><option>medium</option><option>small</option>
      </select>
    </div>
    <div class="field">
      <label for="v-per_page">Results</label>
      <input id="v-per_page" name="per_page" type="number" min="1" max="80" value="12">
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button class="go" type="submit">Search videos</button>
    </div>
  </form>

  <p class="status" id="status"></p>
  <div class="grid" id="grid"></div>

  <p class="credit">Media from <a href="https://www.pexels.com" target="_blank" rel="noopener">Pexels</a>. Attribution required by their free license.</p>
</div>

<script src="config.js"></script>
<script>
  const $ = (s) => document.querySelector(s);
  const API_BASE = window.PIXELS_API_BASE || "";
  const grid = $("#grid"), status = $("#status");
  let activeTab = "photos";

  // Tab switching
  document.querySelectorAll(".tab").forEach((btn) => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll(".tab").forEach((b) => b.classList.toggle("active", b === btn));
      $("#form-photos").classList.toggle("hidden", activeTab !== "photos");
      $("#form-videos").classList.toggle("hidden", activeTab !== "videos");
    });
  });

  function setStatus(msg, isError) {
    status.textContent = msg || "";
    status.classList.toggle("error", !!isError);
  }

  function formToQuery(form) {
    const params = new URLSearchParams();
    new FormData(form).forEach((val, key) => { if (String(val).trim()) params.set(key, val); });
    return params.toString();
  }

  async function search(kind, form, button) {
    const qs = formToQuery(form);
    button.disabled = true;
    setStatus("Searching " + kind + "…");
    grid.innerHTML = "";
    try {
      const res = await fetch(API_BASE + "?type=" + kind + "&" + qs);
      const data = await res.json();
      // Apps Script always returns HTTP 200; logical errors come back in body.error
      if (!res.ok) throw new Error("HTTP " + res.status);
      if (data.error) throw new Error(data.error);
      const items = kind === "photos" ? data.photos : data.videos;
      if (!items || !items.length) { setStatus("No results. Try a different query."); return; }
      setStatus(data.total_results != null
        ? (items.length + " shown · ~" + data.total_results.toLocaleString() + " total matches")
        : (items.length + " results"));
      items.forEach((it) => grid.appendChild(kind === "photos" ? photoCard(it) : videoCard(it)));
    } catch (err) {
      setStatus(err.message, true);
    } finally {
      button.disabled = false;
    }
  }

  function photoCard(p) {
    const card = document.createElement("div");
    card.className = "card";
    const img = document.createElement("img");
    img.loading = "lazy"; img.src = p.src.large; img.alt = p.alt || "";
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.innerHTML =
      '<span>' + p.width + '×' + p.height + '</span>' +
      '<a href="' + p.url + '" target="_blank" rel="noopener">by ' + (p.photographer || "Pexels") + '</a>';
    card.append(img, meta);
    return card;
  }

  function videoCard(v) {
    const card = document.createElement("div");
    card.className = "card";
    // Pick a reasonably small mp4 file to preview.
    const files = (v.video_files || []).slice().sort((a, b) => (a.width || 0) - (b.width || 0));
    const file = files.find((f) => (f.width || 0) >= 640) || files[files.length - 1] || files[0];
    const vid = document.createElement("video");
    vid.src = file ? file.link : ""; vid.poster = v.image;
    vid.muted = true; vid.loop = true; vid.playsInline = true; vid.controls = true; vid.preload = "metadata";
    vid.addEventListener("mouseenter", () => vid.play().catch(() => {}));
    vid.addEventListener("mouseleave", () => vid.pause());
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.innerHTML =
      '<span>' + v.width + '×' + v.height + ' · ' + (v.duration || "?") + 's</span>' +
      '<a href="' + v.url + '" target="_blank" rel="noopener">by ' + ((v.user && v.user.name) || "Pexels") + '</a>';
    card.append(vid, meta);
    return card;
  }

  $("#form-photos").addEventListener("submit", (e) => { e.preventDefault(); search("photos", e.target, e.target.querySelector(".go")); });
  $("#form-videos").addEventListener("submit", (e) => { e.preventDefault(); search("videos", e.target, e.target.querySelector(".go")); });
</script>
</body>
</html>
